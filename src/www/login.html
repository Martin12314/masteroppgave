<!doctype html>
<html>
<head>
    <meta charset="utf-8">
    <title>Login</title>
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <link rel="stylesheet" href="/styles.css">
    <style>
        .card { max-width: 720px; padding:1rem; border:1px solid #ddd; border-radius:.5rem; }
        .row { display:flex; gap:.75rem; align-items:center; flex-wrap:wrap; }
        .muted { color:#555; }
        .bad { color:#b00020; font-weight:600; }
        .good { color:#056e00; font-weight:600; }
        .logbox {
          background:#0b1020; color:#d0d7ff; padding:1rem; border-radius:.5rem;
          max-height:260px; overflow:auto; font-size:.85rem; white-space:pre-wrap; word-break:break-word;
        }
        input[type="number"] { width: 120px; }
        button { padding: .45rem .7rem; }
    </style>
</head>
<body>
<h1>Login (Protected)</h1>

<div class="card">
    <div class="row">
        <label>Username <input id="user" autocomplete="username" value="alice" /></label>
        <label>Password <input id="pass" type="password" autocomplete="current-password" value="secret" /></label>
    </div>

    <div class="row" style="margin-top:.5rem">
        <label>Extra payload (bytes)
            <input id="padBytes" type="number" min="0" step="1" value="0">
        </label>

        <label style="margin-left:auto">
            <input type="checkbox" id="allowUnsafe"> allow unsafe key (for tests)
        </label>
        <label>
            <input type="checkbox" id="verbose"> verbose logs
        </label>
    </div>

    <div class="row" style="margin-top:.5rem">
        <button id="loginBtn" disabled>Sign in</button>
        <button id="benchBtn" disabled>Run 30× login benchmark</button>
        <span id="kxStatus" class="muted">Key exchange not run yet…</span>
    </div>

    <hr>

    <h3 style="margin:.5rem 0 .25rem">Big-content signing benchmark</h3>
    <div class="row">
        <label>Big iterations
            <input id="bigN" type="number" min="1" step="1" value="10">
        </label>
        <button id="bigSignedBtn" disabled>Run big fetch (SIGNED)</button>
        <button id="bigUnsignedBtn" disabled>Run big fetch (UNSIGNED)</button>
        <span class="muted">Fetches big HTML + images each iteration</span>
    </div>
</div>

<h3>Security + app log</h3>
<pre id="security-log" class="logbox">Waiting for Service Worker…</pre>

<script type="module">
    import { CompactEncrypt, importJWK } from 'https://cdn.jsdelivr.net/npm/jose@5.3.0/+esm';
    import { createMetricsClient } from 'https://app.masteroppgave2026.no/assets/metrics-client.js';

    const secLog = document.getElementById('security-log');
    const kxStatus = document.getElementById('kxStatus');
    const loginBtn = document.getElementById('loginBtn');
    const benchBtn = document.getElementById('benchBtn');
    const bigSignedBtn = document.getElementById('bigSignedBtn');
    const bigUnsignedBtn = document.getElementById('bigUnsignedBtn');
    const allowUnsafe = document.getElementById('allowUnsafe');
    const verbose = document.getElementById('verbose');

    const APP_ORIGIN = 'https://app.masteroppgave2026.no';

    function nowIso(){ return new Date().toISOString(); }
    function appendLog(line){ secLog.textContent += line + '\n'; secLog.scrollTop = secLog.scrollHeight; }
    function pageLog(...args){ appendLog(`[${nowIso()}] [PAGE] ${args.join(' ')}`); }
    function utf8Bytes(str){ return new TextEncoder().encode(str).length; }

    const metrics = createMetricsClient({
      endpoint: APP_ORIGIN + '/metrics/ingest',
      storageKey: 'metrics-queue-login-v2',
      debugEnabled: () => verbose.checked,
      onLog: (line) => appendLog(`[${nowIso()}] ${line}`)
    });

    navigator.serviceWorker?.addEventListener('message', e => {
      if (e.data?.type === 'SW_LOG') appendLog(`[${e.data.ts}] [Service Worker] ${e.data.message}`);
    });

    function setKx(ok, msg){
      kxStatus.innerHTML = ok ? `<span class="good">${msg}</span>` : `<span class="bad">${msg}</span>`;
    }

    let jweKey = null;
    let kid = null;
    let kxOK = false;

    function updateButtons() {
      const ok = (kxOK || allowUnsafe.checked);
      loginBtn.disabled = !ok;
      benchBtn.disabled = !ok;
      bigSignedBtn.disabled = !ok;
      bigUnsignedBtn.disabled = !ok;
    }

    async function initKey(){
      const t0 = performance.now();
      try {
        const r = await fetch('/key-exchange', { cache:'no-store' });
        if (!r.ok) throw new Error('HTTP ' + r.status);
        const jwk = await r.json();
        kid = jwk.kid || '(no-kid)';

        jweKey = await importJWK({ kty:'RSA', n:jwk.n, e:jwk.e, alg:'RSA-OAEP-256' }, 'RSA-OAEP-256');
        kxOK = true;
        setKx(true, 'Key exchange OK (JWE key imported)');

        metrics.track('key_exchange_import_ok', {
          kid,
          key_exchange_fetch_ms: Math.round(performance.now() - t0)
        });
        await metrics.flush();
      } catch (e) {
        kxOK = false;
        setKx(false, 'Key exchange failed: ' + (e.message || e));

        metrics.track('key_exchange_import_fail', {
          err: e?.message || String(e)
        });
        await metrics.flush();
      } finally {
        updateButtons();
      }
    }

    allowUnsafe.addEventListener('change', updateButtons);

    function makePad(n){
      n = Math.max(0, (n|0));
      return n ? 'a'.repeat(n) : '';
    }

    async function enc(plaintext){
      const ce = new CompactEncrypt(new TextEncoder().encode(plaintext));
      ce.setProtectedHeader({ alg:'RSA-OAEP-256', enc:'A256GCM', kid });
      return await ce.encrypt(jweKey);
    }

    async function doLoginOnce({ noRedirect = false, runTag = null, iter = null } = {}) {
      if (!(kxOK || allowUnsafe.checked)) throw new Error('Key exchange not OK');
      if (!jweKey) throw new Error('JWE key missing');

      const u = document.getElementById('user').value || '';
      const p = document.getElementById('pass').value || '';

      const padN = Number(document.getElementById('padBytes')?.value || 0) | 0;
      const pad = makePad(padN);

      const plainTotal = utf8Bytes(u) + utf8Bytes(p);

      const tEnc0 = performance.now();
      const uEnc = await enc(u);
      const pEnc = await enc(p);
      const encMs = performance.now() - tEnc0;

      const encTotal = utf8Bytes(uEnc) + utf8Bytes(pEnc);
      const overheadBytes = encTotal - plainTotal;
      const overheadPct = plainTotal > 0 ? (overheadBytes / plainTotal) * 100 : null;

      metrics.track('jwe_encrypt', {
        kid, runTag, iter,
        jwe_encrypt_ms: Math.round(encMs),
        plaintext_bytes_total: plainTotal,
        jwe_compact_bytes_total: encTotal,
        jwe_overhead_bytes: overheadBytes,
        jwe_overhead_pct: overheadPct == null ? null : Math.round(overheadPct * 10) / 10
      });

      const bodyObj = { username: 'JWE: ' + uEnc, password: 'JWE: ' + pEnc, pad };
      const bodyStr = JSON.stringify(bodyObj);
      const reqBodyBytes = utf8Bytes(bodyStr);

      const t0 = performance.now();
      const r = await fetch('/api/login', {
        method:'POST',
        headers:{
          'Content-Type':'application/json',
          'X-Run-Tag': runTag || ''
        },
        body: bodyStr
      });
      const fetchMs = performance.now() - t0;

      const txt = await r.text();
      const respBodyBytes = utf8Bytes(txt);

      metrics.track('login_request', {
        kid, runTag, iter,
        pad_bytes: padN,
        http_status: r.status,
        login_fetch_ms: Math.round(fetchMs),
        login_req_body_bytes: reqBodyBytes,
        login_resp_body_bytes: respBodyBytes
      });

      let j = null;
      try { j = JSON.parse(txt); } catch {}

      if (j?.ok && !noRedirect) {
        metrics.track('login_redirect', { kid, http_status: r.status });
        await metrics.flush({ keepalive: true });
        location.href = '/index.html';
      }

      return { ok: !!j?.ok, status: r.status };
    }

    async function runLoginBenchmark(n = 30) {
      const runTag = `bench-${Date.now()}`;
      pageLog(`Login benchmark start n=${n} runTag=${runTag}`);
      metrics.track('bench_start', { runTag, n });

      const results = [];
      for (let i = 1; i <= n; i++) {
        try {
          const res = await doLoginOnce({ noRedirect: true, runTag, iter: i });
          results.push(res);
          pageLog(`iter ${i}/${n} status=${res.status} ok=${res.ok}`);
        } catch (e) {
          pageLog(`iter ${i}/${n} ERROR ${e?.message || String(e)}`);
          metrics.track('bench_iter_error', {
            runTag,
            iter: i,
            err: e?.message || String(e)
          });
        }
        await new Promise(r => setTimeout(r, 50));
      }

      const okCount = results.filter(x => x.ok).length;
      pageLog(`Login benchmark done ok=${okCount}/${n}`);
      metrics.track('bench_done', { runTag, n, okCount });
      await metrics.flush();
    }

    async function fetchBigOnce({ basePath, runTag, iter }) {
      const htmlUrl = `${basePath}/big.html?cb=${Date.now()}-${Math.random()}&rt=${encodeURIComponent(runTag)}`;
      const t0 = performance.now();
      const r = await fetch(htmlUrl, {
        cache: 'no-store',
        headers: { 'X-Run-Tag': runTag }
      });
      const html = await r.text();
      const htmlMs = performance.now() - t0;

      const srcs = Array.from(html.matchAll(/src="([^"]+)"/g)).map(m => m[1]).filter(Boolean);

      const imgTimes = [];
      let imgBytes = 0;

      for (const s of srcs) {
        const u = s.startsWith('/') ? s : ('/' + s);
        const imgUrl =
          `${basePath}${u}`.replace(`${basePath}${basePath}`, basePath) +
          `?cb=${Date.now()}-${Math.random()}&rt=${encodeURIComponent(runTag)}`;

        const a = performance.now();
        const rr = await fetch(imgUrl, {
          cache: 'no-store',
          headers: { 'X-Run-Tag': runTag }
        });
        const buf = await rr.arrayBuffer();
        imgTimes.push(performance.now() - a);
        imgBytes += buf.byteLength;
      }

      metrics.track('big_fetch', {
        runTag, iter,
        big_mode: basePath.includes('/unsigned') ? 'unsigned' : 'signed',
        big_html_fetch_ms: Math.round(htmlMs),
        big_html_bytes: utf8Bytes(html),
        big_img_count: srcs.length,
        big_img_total_bytes: imgBytes,
        big_img_fetch_ms_mean: srcs.length ? Math.round(imgTimes.reduce((x,y)=>x+y,0)/srcs.length) : 0
      });

      return { htmlMs, imgCount: srcs.length };
    }

    async function runBigBenchmark({ signed }) {
      const n = Number(document.getElementById('bigN')?.value || 10) | 0;
      const runTag = `${signed ? 'big-signed' : 'big-unsigned'}-${Date.now()}`;
      const basePath = signed ? '' : '/unsigned';

      pageLog(`Big benchmark start signed=${signed} n=${n} runTag=${runTag}`);
      metrics.track('big_bench_start', {
        runTag,
        n,
        big_mode: signed ? 'signed' : 'unsigned'
      });

      for (let i = 1; i <= n; i++) {
        try {
          const res = await fetchBigOnce({ basePath, runTag, iter: i });
          pageLog(`big iter ${i}/${n} htmlMs=${Math.round(res.htmlMs)} imgs=${res.imgCount}`);
        } catch (e) {
          pageLog(`big iter ${i}/${n} ERROR ${e?.message || String(e)}`);
          metrics.track('big_bench_iter_error', {
            runTag,
            iter: i,
            err: e?.message || String(e)
          });
        }
        await new Promise(r => setTimeout(r, 80));
      }

      pageLog(`Big benchmark done runTag=${runTag}`);
      metrics.track('big_bench_done', {
        runTag,
        n,
        big_mode: signed ? 'signed' : 'unsigned'
      });
      await metrics.flush();
    }

    loginBtn.addEventListener('click', (e) => {
      e.preventDefault();
      doLoginOnce({ noRedirect: false }).catch(err => {
        pageLog('Login ERROR:', err?.message || String(err));
        alert('Login error: ' + (err?.message || err));
      });
    });

    benchBtn.addEventListener('click', (e) => {
      e.preventDefault();
      runLoginBenchmark(30).catch(err => pageLog('BENCH ERROR:', err?.message || String(err)));
    });

    bigSignedBtn.addEventListener('click', (e) => {
      e.preventDefault();
      runBigBenchmark({ signed: true }).catch(err => pageLog('BIG SIGNED ERROR:', err?.message || String(err)));
    });

    bigUnsignedBtn.addEventListener('click', (e) => {
      e.preventDefault();
      runBigBenchmark({ signed: false }).catch(err => pageLog('BIG UNSIGNED ERROR:', err?.message || String(err)));
    });

    initKey();
</script>
</body>
</html>
