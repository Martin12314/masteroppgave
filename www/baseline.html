<!doctype html>
<html>
<head>
    <meta charset="utf-8">
    <title>Baseline Login</title>
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <link rel="stylesheet" href="/styles.css">
    <style>
        .card { max-width: 720px; padding:1rem; border:1px solid #ddd; border-radius:.5rem; }
        .row { display:flex; gap:.75rem; align-items:center; flex-wrap:wrap; }
        .logbox {
          background:#0b1020; color:#d0d7ff; padding:1rem; border-radius:.5rem;
          max-height:260px; overflow:auto; font-size:.85rem; white-space:pre-wrap; word-break:break-word;
        }
        input[type="number"] { width: 120px; }
    </style>
</head>
<body>
<h1>Login (Baseline)</h1>

<div class="card">
    <div class="row">
        <label>Username <input id="user" value="alice" /></label>
        <label>Password <input id="pass" type="password" value="secret" /></label>
    </div>

    <div class="row" style="margin-top:.5rem">
        <label>Extra payload (bytes)
            <input id="padBytes" type="number" min="0" step="1" value="0">
        </label>
        <button id="benchBtn">Run 30&times; baseline benchmark</button>
    </div>
</div>

<h3>Log</h3>
<pre id="log" class="logbox"></pre>

<script>
    const APP_ORIGIN = 'https://app.masteroppgave2026.no';
    const METRICS_URL = APP_ORIGIN + '/metrics/ingest';

    function nowIso(){ return new Date().toISOString(); }
    function utf8Bytes(str){ return new TextEncoder().encode(str).length; }

    function makePad(n){
      n = Math.max(0, (n|0));
      return n ? 'a'.repeat(n) : '';
    }

    async function postMetric(eventName, fields = {}) {
      const payload = {
        event: eventName,
        at: new Date().toISOString(),
        page_url: location.href,
        origin: location.origin,
        ...fields
      };
      console.log('[BASELINE] METRIC SEND', eventName, payload);
      try {
        await fetch(METRICS_URL, {
          method: 'POST',
          mode: 'no-cors',
          body: JSON.stringify(payload)
        });
        console.log('[BASELINE] METRIC SENT', eventName);
      } catch(e) {
        console.error('[BASELINE] METRIC ERROR', eventName, e);
      }
    }

    async function doBaselineOnce({ runTag, iter }){
      const u = document.getElementById('user').value || '';
      const p = document.getElementById('pass').value || '';
      const padN = Number(document.getElementById('padBytes')?.value || 0) | 0;
      const pad = makePad(padN);

      const bodyObj = { username: u, password: p, pad };
      const bodyStr = JSON.stringify(bodyObj);

      const t0 = performance.now();
      const r = await fetch('/api/login_plain', {
        method:'POST',
        headers:{
          'Content-Type':'application/json',
          'X-Run-Tag': runTag || ''
        },
        body: bodyStr
      });
      const fetchMs = performance.now() - t0;

      const txt = await r.text();
      await postMetric('baseline_login_request', {
        runTag, iter,
        pad_bytes: padN,
        http_status: r.status,
        login_fetch_ms: Math.round(fetchMs),
        login_req_body_bytes: utf8Bytes(bodyStr),
        login_resp_body_bytes: utf8Bytes(txt)
      });

      let j=null; try{ j=JSON.parse(txt);}catch{}
      return { ok: !!j?.ok, status: r.status };
    }

    async function runBaselineBench(n=30){
      const runTag = `baseline-${Date.now()}`;
      const logEl = document.getElementById('log');

      await postMetric('baseline_bench_start', { runTag, n });

      let okCount=0;
      for (let i=1;i<=n;i++){
        try{
          const res = await doBaselineOnce({ runTag, iter:i });
          if(res.ok) okCount++;
          logEl.textContent += `[${nowIso()}] iter ${i}/${n} status=${res.status} ok=${res.ok}\n`;
          logEl.scrollTop = logEl.scrollHeight;
        }catch(e){
          await postMetric('baseline_iter_error', { runTag, iter:i, err: e?.message || String(e) });
        }
        await new Promise(r=>setTimeout(r,50));
      }

      await postMetric('baseline_bench_done', { runTag, n, okCount });
      logEl.textContent += `[${nowIso()}] done ok=${okCount}/${n}\n`;
    }

    document.getElementById('benchBtn').addEventListener('click', e => {
      e.preventDefault();
      runBaselineBench(30);
    });
</script>
</body>
</html>
